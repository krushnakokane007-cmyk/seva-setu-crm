<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#030810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Seva Setu CRM"/>
<meta name="description" content="Seva Setu Realty - Lead Management CRM"/>
<title>Seva Setu CRM</title>
<link rel="manifest" href="manifest.json"/>
<!-- Apple PWA icons fallback inline -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c9a227'/><text y='.9em' font-size='80' x='10'>🏠</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#030810;color:#fff;font-family:'DM Sans',system-ui,sans-serif;overscroll-behavior:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(201,162,39,0.3);border-radius:2px;}
input,select,textarea{font-family:'DM Sans',system-ui,sans-serif;}
a{-webkit-touch-callout:none;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } = Recharts;

/* ── CONSTANTS ── */
const GOLD="#c9a227", GOLD_L="#e8c84a", NAV_BG="#04091a", CARD_BG="#07111f", CBORDER="rgba(201,162,39,0.18)";
const STAGES=["New Lead","Contacted","Site Visit","Negotiation","Won","Lost"];
const SMETA={
  "New Lead":   {color:"#3b82f6",light:"rgba(59,130,246,0.15)",icon:"🆕"},
  "Contacted":  {color:"#f59e0b",light:"rgba(245,158,11,0.15)",icon:"📞"},
  "Site Visit": {color:"#8b5cf6",light:"rgba(139,92,246,0.15)",icon:"🏠"},
  "Negotiation":{color:"#f97316",light:"rgba(249,115,22,0.15)",icon:"🤝"},
  "Won":        {color:"#10b981",light:"rgba(16,185,129,0.15)",icon:"🏆"},
  "Lost":       {color:"#ef4444",light:"rgba(239,68,68,0.15)",icon:"❌"},
};
const SOURCES=["Housing.com","Facebook Ad","Instagram","WhatsApp","Reference","99acres","Walk-in","Other"];
const BUDGETS=["Under 50L","50L – 80L","80L – 1.2Cr","1.2Cr – 2Cr","Above 2Cr"];
const WA_TPL=[
  {label:"First Contact",icon:"👋",text:(n,p)=>`Namaste ${n}! 🙏\n\nMi Seva Setu Realty madhe ${p||'amacha project'} sathi contact karat ahe. Tumhi interest dakhavala tyabaddal dhanyavad!\n\nKay mi tumhala project che details share karu shakto?\n\n— Seva Setu Realty`},
  {label:"Follow-Up",icon:"🔔",text:(n,p)=>`Namaste ${n}! 👋\n\n${p||'Premium homes'} baabat follow-up karat ahe.\n\nKev site visit suitable ahe tumhala? Watat ahe tumchya response sathi 😊\n\n— Seva Setu Realty`},
  {label:"Site Visit",icon:"🗓",text:(n,p)=>`Namaste ${n}! 🏠\n\n${p||'Amacha project'} chya site visit sathi invite karat ahe!\n\n📍 Location ready ✅\n🕐 Tumchya veli nusaar\n☕ Tea arrangement aahe\n\nDate confirm karaa — Seva Setu Realty`},
  {label:"Price Quote",icon:"💰",text:(n,p)=>`Namaste ${n}! 💰\n\n${p||'Premium Home'} sathi special price quote ready ahe!\n\nMarket peksha better deal — tumchya budget nusaar perfect options.\n\nCall kara — Seva Setu Realty`},
  {label:"Deal Closing",icon:"🤝",text:(n,p)=>`Namaste ${n}! 🎉\n\n${p||'Dream home'} madhe welcome karayala utsuktaa ahe!\n\nPudhil steps, documents, payment plan — sab ready. Confirm kara!\n\n— Seva Setu Realty 🏠`},
  {label:"Thank You",icon:"🙏",text:(n,p)=>`Namaste ${n}! 🙏\n\n${p||'Project'} madhe invest kelas tyabaddal khup dhanyavad!\n\nTumhi aata Seva Setu Realty Family cha bhag aahat 🏠✨\n\n— Seva Setu Realty Team`},
];

/* ── HELPERS ── */
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const today=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>{if(!d)return"—";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const isOv=d=>d&&d<today();
const isDT=d=>d===today();

/* ── STORAGE helpers (localStorage fallback since no window.storage in standalone) ── */
const store={
  get:k=>{try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch{}},
};

/* ── GLOBAL STYLES ── */
const G={
  card:{background:CARD_BG,border:`1px solid ${CBORDER}`,borderRadius:20},
  goldBtn:{background:`linear-gradient(135deg,${GOLD},#a07818)`,color:"#000",fontWeight:900,borderRadius:14,border:"none",cursor:"pointer"},
  inp:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(201,162,39,0.2)",borderRadius:12,color:"#fff",fontSize:14,padding:"11px 14px",width:"100%",outline:"none",appearance:"none",WebkitAppearance:"none"},
};

/* ══════════ TOAST ══════════ */
function Toast({toasts}){
  return <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none",maxWidth:280}}>
    {toasts.map(t=><div key={t.id} style={{padding:"11px 16px",borderRadius:14,fontSize:13,fontWeight:700,display:"flex",alignItems:"center",gap:8,boxShadow:"0 8px 32px rgba(0,0,0,0.6)",
      background:t.type==="success"?"linear-gradient(135deg,#065f46,#047857)":t.type==="error"?"linear-gradient(135deg,#7f1d1d,#b91c1c)":"linear-gradient(135deg,#1e3a5f,#1d4ed8)",
      border:`1px solid ${t.type==="success"?"#10b98160":t.type==="error"?"#ef444460":"#3b82f660"}`,color:"#fff"}}>
      <span style={{fontSize:16}}>{t.icon}</span>{t.msg}
    </div>)}
  </div>;
}

/* ══════════ LEAD FORM ══════════ */
function LeadForm({lead,onSave,onClose}){
  const blank={id:null,name:"",phone:"",email:"",source:"Housing.com",budget:"80L – 1.2Cr",project:"",stage:"New Lead",followUpDate:"",notes:"",createdAt:"",housingId:""};
  const [f,setF]=useState(lead||blank);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const Lbl=({c})=><label style={{display:"block",fontSize:10,fontWeight:700,color:`${GOLD}99`,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.08em"}}>{c}</label>;
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.85)",backdropFilter:"blur(10px)"}}>
      <div style={{...G.card,width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto",borderRadius:"24px 24px 0 0"}}>
        <div style={{padding:"18px 20px 14px",borderBottom:`1px solid ${CBORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:CARD_BG,zIndex:1}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:GOLD_L}}>{f.id?"Edit Lead":"New Lead"}</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:26,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>×</button>
        </div>
        <div style={{padding:"20px 20px 8px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{gridColumn:"span 2"}}><Lbl c="Full Name *"/><input style={G.inp} placeholder="Lead's full name" value={f.name} onChange={e=>s("name",e.target.value)}/></div>
          <div><Lbl c="Phone *"/><input style={G.inp} placeholder="+91 98765 43210" value={f.phone} onChange={e=>s("phone",e.target.value)}/></div>
          <div><Lbl c="Email"/><input style={G.inp} type="email" placeholder="email@ex.com" value={f.email} onChange={e=>s("email",e.target.value)}/></div>
          {[{k:"source",l:"Source",o:SOURCES},{k:"budget",l:"Budget",o:BUDGETS},{k:"stage",l:"Stage",o:STAGES}].map(({k,l,o})=>(
            <div key={k}><Lbl c={l}/>
              <select style={G.inp} value={f[k]} onChange={e=>s(k,e.target.value)}>
                {o.map(x=><option key={x} value={x} style={{background:CARD_BG}}>{x}</option>)}
              </select>
            </div>
          ))}
          <div><Lbl c="Project"/><input style={G.inp} placeholder="Project name" value={f.project} onChange={e=>s("project",e.target.value)}/></div>
          <div style={{gridColumn:"span 2"}}><Lbl c="Follow-Up Date"/><input style={G.inp} type="date" value={f.followUpDate} onChange={e=>s("followUpDate",e.target.value)}/></div>
          <div style={{gridColumn:"span 2"}}><Lbl c="Notes"/><textarea style={{...G.inp,resize:"vertical",minHeight:72,fontFamily:"inherit"}} placeholder="Conversation notes..." value={f.notes} onChange={e=>s("notes",e.target.value)}/></div>
        </div>
        <div style={{padding:"12px 20px 32px",display:"flex",gap:10}}>
          <button onClick={()=>{if(!f.name.trim()||!f.phone.trim()){alert("Name & Phone required");return;}onSave({...f,id:f.id||genId(),createdAt:f.createdAt||today()});}}
            style={{...G.goldBtn,flex:1,padding:"13px 0",fontSize:14}}>{f.id?"✓ Update":"✓ Save Lead"}</button>
          <button onClick={onClose} style={{padding:"13px 18px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,color:"rgba(255,255,255,0.7)",fontSize:14,cursor:"pointer",fontWeight:600}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════ WHATSAPP MODAL ══════════ */
function WAModal({leads,onClose}){
  const [selL,setSelL]=useState(null);
  const [selT,setSelT]=useState(null);
  const [prev,setPrev]=useState("");
  const pick=(t)=>{setSelT(t);if(selL)setPrev(t.text(selL.name,selL.project));};
  const pickL=(l)=>{setSelL(l);if(selT)setPrev(selT.text(l.name,l.project));};
  const send=()=>{if(!selL||!prev)return;const n=selL.phone.replace(/\D/g,"");window.open(`https://wa.me/${n.startsWith("91")?n:"91"+n}?text=${encodeURIComponent(prev)}`,"_blank");};
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.88)",backdropFilter:"blur(12px)"}}>
      <div style={{...G.card,width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto",borderRadius:"24px 24px 0 0"}}>
        <div style={{padding:"18px 20px 14px",borderBottom:`1px solid ${CBORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:CARD_BG}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:"#25d366"}}>💬 WhatsApp Templates</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:26,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:20,display:"flex",flexDirection:"column",gap:16}}>
          {/* Lead select */}
          <div>
            <div style={{fontSize:10,fontWeight:700,color:`${GOLD}99`,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Select Lead</div>
            <div style={{maxHeight:140,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {leads.map(l=>(
                <button key={l.id} onClick={()=>pickL(l)} style={{textAlign:"left",padding:"8px 12px",borderRadius:10,border:`1px solid ${selL?.id===l.id?GOLD:"rgba(255,255,255,0.08)"}`,background:selL?.id===l.id?"rgba(201,162,39,0.12)":"rgba(255,255,255,0.03)",cursor:"pointer",color:"#fff"}}>
                  <div style={{fontSize:13,fontWeight:700}}>{l.name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.45)"}}>{l.phone} · {l.stage}</div>
                </button>
              ))}
              {!leads.length&&<div style={{fontSize:12,color:"rgba(255,255,255,0.3)",padding:8}}>No leads yet</div>}
            </div>
          </div>
          {/* Templates */}
          <div>
            <div style={{fontSize:10,fontWeight:700,color:`${GOLD}99`,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Template</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {WA_TPL.map(t=>(
                <button key={t.label} onClick={()=>pick(t)} style={{textAlign:"left",padding:"10px 12px",borderRadius:10,border:`1px solid ${selT?.label===t.label?GOLD:"rgba(255,255,255,0.08)"}`,background:selT?.label===t.label?"rgba(201,162,39,0.12)":"rgba(255,255,255,0.03)",cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:20}}>{t.icon}</span>
                  <span style={{fontSize:12,fontWeight:600}}>{t.label}</span>
                </button>
              ))}
            </div>
          </div>
          {/* Preview */}
          {prev&&<>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:`${GOLD}99`,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Preview & Edit</div>
              <textarea style={{...G.inp,fontSize:12,lineHeight:1.6,fontFamily:"inherit",minHeight:120,resize:"vertical"}} value={prev} onChange={e=>setPrev(e.target.value)}/>
            </div>
          </>}
          <button onClick={send} disabled={!selL||!prev} style={{padding:"14px 0",borderRadius:14,border:"none",fontWeight:900,fontSize:14,cursor:selL&&prev?"pointer":"not-allowed",opacity:selL&&prev?1:0.4,background:"linear-gradient(135deg,#128c7e,#25d366)",color:"#fff"}}>
            💬 Open in WhatsApp
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════ DASHBOARD ══════════ */
function Dashboard({leads}){
  const total=leads.length, won=leads.filter(l=>l.stage==="Won").length,
    hot=leads.filter(l=>["Site Visit","Negotiation"].includes(l.stage)).length,
    ov=leads.filter(l=>isOv(l.followUpDate)).length,
    td=leads.filter(l=>isDT(l.followUpDate)).length;
  const stageData=STAGES.map(s=>({name:s,value:leads.filter(l=>l.stage===s).length,color:SMETA[s].color}));
  const srcData=SOURCES.map(s=>({name:s.length>8?s.slice(0,8)+"…":s,count:leads.filter(l=>l.source===s).length})).filter(x=>x.count>0);
  const CT=({active,payload,label})=>active&&payload?.length?<div style={{background:CARD_BG,border:`1px solid ${CBORDER}`,borderRadius:10,padding:"8px 14px"}}><div style={{fontSize:11,color:GOLD_L}}>{label}</div><div style={{fontSize:15,fontWeight:900,color:"#fff"}}>{payload[0].value}</div></div>:null;
  const SC=({icon,label,value,color="#c9a227",sub})=>(
    <div style={{...G.card,padding:"16px 18px",flex:"1 1 140px"}}>
      <div style={{fontSize:26,marginBottom:6}}>{icon}</div>
      <div style={{fontSize:28,fontWeight:900,color,fontFamily:"'Playfair Display',serif",lineHeight:1}}>{value}</div>
      <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.8)",marginTop:5}}>{label}</div>
      {sub&&<div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:2}}>{sub}</div>}
    </div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {(ov>0||td>0)&&<div style={{background:"linear-gradient(135deg,rgba(239,68,68,0.12),rgba(245,158,11,0.08))",border:"1px solid rgba(239,68,68,0.3)",borderRadius:16,padding:"13px 18px",display:"flex",flexWrap:"wrap",alignItems:"center",gap:10}}>
        <span style={{fontSize:16}}>⚠️</span>
        {ov>0&&<span style={{fontSize:13,fontWeight:700,color:"#fca5a5"}}>{ov} overdue follow-up{ov>1?"s":""}</span>}
        {td>0&&<span style={{fontSize:13,fontWeight:700,color:"#fcd34d"}}>{td} due today</span>}
      </div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
        <SC icon="👥" label="Total Leads"  value={total} sub="All time"/>
        <SC icon="🏆" label="Deals Won"    value={won}   sub={total?`${Math.round(won/total*100)}% conversion`:"-"} color="#10b981"/>
        <SC icon="🔥" label="Hot Leads"    value={hot}   sub="Visit+Negotiation" color="#f97316"/>
        <SC icon="🔔" label="Due Today"    value={td}    sub={ov?`${ov} overdue`:"On track"} color={ov>0?"#ef4444":GOLD}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
        <div style={{...G.card,padding:"18px 12px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:GOLD_L,marginBottom:14,paddingLeft:8}}>Pipeline by Stage</div>
          <ResponsiveContainer width="100%" height={200}>
            <PieChart>
              <Pie data={stageData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={3} dataKey="value">
                {stageData.map((e,i)=><Cell key={i} fill={e.color}/>)}
              </Pie>
              <Tooltip content={({active,payload})=>active&&payload?.length?<div style={{background:CARD_BG,border:`1px solid ${CBORDER}`,borderRadius:10,padding:"8px 14px"}}><div style={{fontSize:12,fontWeight:700,color:payload[0].payload.color}}>{payload[0].name}</div><div style={{fontSize:14,fontWeight:900,color:"#fff"}}>{payload[0].value} leads</div></div>:null}/>
              <Legend formatter={v=><span style={{color:"rgba(255,255,255,0.6)",fontSize:10}}>{v}</span>}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
        <div style={{...G.card,padding:"18px 12px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:GOLD_L,marginBottom:14,paddingLeft:8}}>Leads by Source</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={srcData} margin={{top:0,right:0,bottom:0,left:-24}}>
              <XAxis dataKey="name" tick={{fontSize:9,fill:"rgba(255,255,255,0.5)"}} tickLine={false} axisLine={false}/>
              <YAxis tick={{fontSize:9,fill:"rgba(255,255,255,0.4)"}} tickLine={false} axisLine={false} allowDecimals={false}/>
              <Tooltip content={<CT/>} cursor={{fill:"rgba(201,162,39,0.06)"}}/>
              <Bar dataKey="count" fill={GOLD} radius={[6,6,0,0]} maxBarSize={36}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
      {/* Recent */}
      <div style={{...G.card,padding:"18px 20px"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:GOLD_L,marginBottom:14}}>Recent Leads</div>
        {leads.length===0&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:13,textAlign:"center",padding:"20px 0"}}>No leads yet. Add kara Leads tab madhe!</div>}
        {leads.slice(0,6).map(l=>(
          <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,background:SMETA[l.stage]?.light}}>{SMETA[l.stage]?.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,color:"#fff",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.name}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{l.source} · {l.budget}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:10,fontWeight:700,color:SMETA[l.stage]?.color,background:SMETA[l.stage]?.light,padding:"3px 9px",borderRadius:20}}>{l.stage}</div>
              {l.followUpDate&&<div style={{fontSize:9,color:isOv(l.followUpDate)?"#ef4444":isDT(l.followUpDate)?"#f59e0b":"rgba(255,255,255,0.3)",marginTop:3}}>{fmtDate(l.followUpDate)}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════ KANBAN ══════════ */
function Kanban({leads,onUpdate,onEdit}){
  const [dragging,setDragging]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const drop=(stage)=>{if(dragging&&dragging.stage!==stage)onUpdate({...dragging,stage});setDragging(null);setDragOver(null);};
  return(
    <div style={{overflowX:"auto",paddingBottom:16}}>
      <div style={{display:"flex",gap:12,minWidth:"max-content",paddingBottom:4}}>
        {STAGES.map(stage=>{
          const meta=SMETA[stage], col=leads.filter(l=>l.stage===stage), isTarget=dragOver===stage;
          return(
            <div key={stage} style={{width:220,display:"flex",flexDirection:"column"}}
              onDragOver={e=>{e.preventDefault();setDragOver(stage);}} onDragLeave={()=>setDragOver(null)} onDrop={()=>drop(stage)}>
              <div style={{padding:"10px 12px",borderRadius:"14px 14px 0 0",background:isTarget?meta.light:"rgba(255,255,255,0.04)",border:`1px solid ${isTarget?meta.color:CBORDER}`,borderBottom:"none",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>{meta.icon}</span>
                <span style={{fontWeight:800,fontSize:12,color:meta.color,flex:1}}>{stage}</span>
                <span style={{fontSize:10,fontWeight:700,background:meta.light,color:meta.color,padding:"2px 8px",borderRadius:20}}>{col.length}</span>
              </div>

  return ContentService.createTextOutput(JSON.stringify({status:"ok"}))

/* ══════════ MAIN APP ══════════ */
function App(){
  const [leads,setLeads]=useState([]);
  const [tab,setTab]=useState("dashboard");
  const [showForm,setShowForm]=useState(false);
  const [editLead,setEditLead]=useState(null);
  const [showWA,setShowWA]=useState(false);
  const [hCreds,setHCreds]=useState(null);
  const [sUrl,setSUrl]=useState("");
  const [syncing,setSyncing]=useState(false);
  const [fetching,setFetching]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    try{
      const a=store.get("sscrm_leads");  if(a?.value)setLeads(JSON.parse(a.value));
      const b=store.get("sscrm_sheet");  if(b?.value)setSUrl(b.value);
      const c=store.get("sscrm_hcreds"); if(c?.value)setHCreds(JSON.parse(c.value));
    }catch{}
    setReady(true);
  },[]);

  useEffect(()=>{if(ready)store.set("sscrm_leads",JSON.stringify(leads));},[leads,ready]);

  const addToast=useCallback((msg,type="success",icon="✓")=>{
    const id=genId();setToasts(t=>[...t,{id,msg,type,icon}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);

  async function saveLead(lead){
    const ex=leads.find(l=>l.id===lead.id);
    setLeads(p=>ex?p.map(l=>l.id===lead.id?lead:l):[lead,...p]);
    setShowForm(false);setEditLead(null);
    addToast(ex?"Lead updated":"Lead saved","success","✅");
    if(sUrl)await syncSheet([lead],"upsert");
  }
  async function updateLead(lead){
    setLeads(p=>p.map(l=>l.id===lead.id?lead:l));
    addToast(`${lead.name} → ${lead.stage}`,"success","🔄");
    if(sUrl)await syncSheet([lead],"upsert");
  }
  async function deleteLead(id){
    if(!confirm("Delete this lead?"))return;
    setLeads(p=>p.filter(l=>l.id!==id));
    addToast("Deleted","info","🗑");
    if(sUrl)await syncSheet(null,"delete",id);
  }
  async function syncSheet(ld,action,delId){
    if(!sUrl)return;setSyncing(true);
    try{
      const body=action==="delete"?{action:"delete",id:delId}:ld.length===1?{action:"upsert",lead:ld[0]}:{action:"upsert",leads:ld};
      await fetch(sUrl,{method:"POST",body:JSON.stringify(body)});
      if(action!=="delete")addToast("Synced to Sheets","success","📊");
    }catch{addToast("Sheet sync failed","error","❌");}
    setSyncing(false);
  }
  async function syncAll(){
    if(!sUrl){addToast("Sheets not connected","error","❌");return;}
    if(!leads.length){addToast("No leads to sync","info","ℹ️");return;}
    await syncSheet(leads,"upsert");
  }
  function exportCSV(){
    const hdr=["Name","Phone","Email","Source","Budget","Project","Stage","FollowUp","Notes","Created"];
    const rows=leads.map(l=>[l.name,l.phone,l.email,l.source,l.budget,l.project,l.stage,l.followUpDate,l.notes?.replace(/,/g,";"),l.createdAt]);
    const csv=[hdr,...rows].map(r=>r.map(v=>`"${v||""}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="SevaSetu_Leads.csv";a.click();
    URL.revokeObjectURL(url);
    addToast("CSV exported!","success","📥");
  }
  async function fetchHousing(){
    if(!hCreds?.apiKey||!hCreds?.accountId){addToast("Housing credentials setup kara","error","🏠");setTab("settings");return;}
    setFetching(true);
    try{
      const nowEp=Math.floor(Date.now()/1000),startEp=nowEp-(30*24*3600),curT=nowEp.toString();
      const enc=new TextEncoder(),k=await crypto.subtle.importKey("raw",enc.encode(hCreds.apiKey),{name:"HMAC",hash:"SHA-256"},false,["sign"]);
      const sig=await crypto.subtle.sign("HMAC",k,enc.encode(curT));
      const hash=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
      const params=new URLSearchParams({start_date:startEp.toString(),end_date:nowEp.toString(),current_time:curT,hash,id:hCreds.accountId,...(hCreds.projectId?{project_id:hCreds.projectId}:{})});
      const res=await fetch(`https://leads.housing.com/api/v0/get-builder-leads?${params}`);
      if(!res.ok){addToast(`Housing error ${res.status}`,"error","❌");setFetching(false);return;}
      const data=await res.json();
      const raw=Array.isArray(data)?data:(data.leads||data.data||[]);
      const newL=[];raw.forEach(hl=>{
        const hId=(hl.lead_id||hl.id||genId()).toString();
        if(leads.find(l=>l.housingId===hId))return;
        newL.push({id:genId(),housingId:hId,name:hl.lead_name||"Unknown",phone:hl.lead_phone||"",email:hl.lead_email||"",source:"Housing.com",budget:"80L – 1.2Cr",project:hl.project_name||"",stage:"New Lead",followUpDate:today(),notes:`Locality: ${hl.locality||"—"}`,createdAt:hl.lead_date?new Date(hl.lead_date*1000).toISOString().split("T")[0]:today()});
      });
      if(newL.length){setLeads(p=>[...newL,...p]);addToast(`${newL.length} leads imported!`,"success","🏠");if(sUrl)await syncSheet(newL,"upsert");}
      else addToast("No new leads","info","ℹ️");
    }catch(err){
      if(err.name==="TypeError")addToast("CORS error — n8n proxy lagel","error","⚠️");
      else addToast("Fetch failed","error","❌");
    }
    setFetching(false);
  }
  async function saveHCreds(c){setHCreds(c);store.set("sscrm_hcreds",JSON.stringify(c));addToast("Housing credentials saved","success","🏠");}
  async function saveSUrl(u){setSUrl(u);store.set("sscrm_sheet",u);addToast("Sheets connected","success","📊");if(u&&leads.length)setTimeout(()=>syncSheet(leads,"upsert"),400);}

  const ovC=leads.filter(l=>isOv(l.followUpDate)).length;
  const tdC=leads.filter(l=>isDT(l.followUpDate)).length;

  const NAV=[
    {id:"dashboard",icon:"⬡",label:"Home"},
    {id:"kanban",   icon:"⊞",label:"Kanban"},
    {id:"leads",    icon:"☰",label:"Leads",badge:leads.length},
    {id:"followups",icon:"🔔",label:"Alerts",badge:ovC+tdC},
    {id:"settings", icon:"⚙",label:"Setup"},
  ];

  const tabLabel=NAV.find(n=>n.id===tab)?.label||"";

  return(
    <div style={{minHeight:"100vh",background:NAV_BG,display:"flex",flexDirection:"column",maxWidth:"100vw",overflow:"hidden"}}>
      <Toast toasts={toasts}/>
      {(showForm||editLead)&&<LeadForm lead={editLead} onSave={saveLead} onClose={()=>{setShowForm(false);setEditLead(null);}}/>}
      {showWA&&<WAModal leads={leads} onClose={()=>setShowWA(false)}/>}

      {/* ── TOP BAR ── */}
      <div style={{padding:"14px 18px 12px",borderBottom:`1px solid ${CBORDER}`,display:"flex",alignItems:"center",gap:10,background:"rgba(3,8,16,0.97)",position:"sticky",top:0,zIndex:50,backdropFilter:"blur(16px)"}}>
        <div style={{width:36,height:36,borderRadius:11,background:`linear-gradient(135deg,${GOLD},#8a6010)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🏠</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:GOLD_L,lineHeight:1}}>Seva Setu CRM</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2}}>{tabLabel} · {leads.length} leads{(ovC+tdC)>0?` · ⚠️ ${ovC+tdC} alerts`:""}{syncing?" · ⏳ syncing...":""}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={fetchHousing} disabled={fetching}
            style={{padding:"7px 10px",borderRadius:10,border:"1px solid rgba(139,92,246,0.35)",background:"rgba(139,92,246,0.12)",color:"#c4b5fd",fontSize:11,fontWeight:700,cursor:fetching?"not-allowed":"pointer",opacity:fetching?0.6:1,whiteSpace:"nowrap"}}>
            {fetching?"⏳":"🏠"}</button>
          <button onClick={exportCSV}
            style={{padding:"7px 10px",borderRadius:10,border:`1px solid rgba(201,162,39,0.3)`,background:"rgba(201,162,39,0.08)",color:GOLD,fontSize:11,fontWeight:700,cursor:"pointer"}}>
            📥</button>
          <button onClick={()=>setShowForm(true)}
            style={{...G.goldBtn,padding:"8px 14px",fontSize:12,whiteSpace:"nowrap"}}>+ Add</button>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 16px 100px"}}>
        {tab==="dashboard"&&<Dashboard leads={leads}/>}
        {tab==="kanban"   &&<Kanban leads={leads} onUpdate={updateLead} onEdit={l=>{setEditLead(l);setShowForm(true);}}/>}
        {tab==="leads"    &&<LeadsList leads={leads} onEdit={l=>{setEditLead(l);setShowForm(true);}} onDelete={deleteLead}/>}
        {tab==="followups"&&<FollowUps leads={leads} onEdit={l=>{setEditLead(l);setShowForm(true);}} onDelete={deleteLead}/>}
        {tab==="settings" &&<Settings hCreds={hCreds} sUrl={sUrl} onSaveH={saveHCreds} onSaveS={saveSUrl}/>}
      </div>

      {/* WhatsApp FAB */}
      <button onClick={()=>setShowWA(true)}
        style={{position:"fixed",right:20,bottom:90,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#128c7e,#25d366)",border:"none",cursor:"pointer",fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(37,211,102,0.4)",zIndex:40}}>
        💬
      </button>

      {/* ── BOTTOM NAV ── */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(3,8,16,0.97)",borderTop:`1px solid ${CBORDER}`,display:"flex",backdropFilter:"blur(16px)",zIndex:50,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)}
            style={{flex:1,padding:"10px 0 8px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative",borderTop:`2px solid ${tab===n.id?GOLD:"transparent"}`,transition:"border-color 0.15s"}}>
            <span style={{fontSize:18,lineHeight:1}}>{n.icon}</span>
            <span style={{fontSize:9,fontWeight:700,color:tab===n.id?GOLD_L:"rgba(255,255,255,0.4)",letterSpacing:"0.03em"}}>{n.label}</span>
            {!!n.badge&&<span style={{position:"absolute",top:6,right:"50%",transform:"translateX(10px)",fontSize:8,fontWeight:900,background:n.id==="followups"&&(ovC>0)?"#ef4444":GOLD,color:"#000",padding:"1px 5px",borderRadius:20,minWidth:14,textAlign:"center"}}>{n.badge}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA Service Worker -->
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then(()=>console.log("SW registered")).catch(()=>{});
  });
}
</script>
</body>
</html>
